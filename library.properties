name=UngulaLoadcell
version=1.0.2
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: load cell drivers (HX711, NAU7802, ADS1220, ADS1232) with tension sensing.
paragraph=Embedded C++17 load-cell stack. Chip-neutral IAdc24 interface with drivers for HX711 (GPIO bit-bang), NAU7802 (I2C), ADS1220 and ADS1232 (SPI). LoadCell class provides calibrated output in Newtons / kgf / lbf. TensionSensor adds EMA smoothing, stability detection and target tracking. Supported targets: ESP32 today via UngulaHal; STM32 and other MCUs when the matching HAL backend lands.
category=Sensors
url=https://github.com/alexconesap/ungula-loadcell.git
includes=ungula_loadcell.h
depends=UngulaCore,UngulaHal
architectures=esp32
